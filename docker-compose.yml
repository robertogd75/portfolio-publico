services:
  portfolio:
    build: .
    container_name: portfolio-publico
    restart: unless-stopped
    ports:
      - "8085:80"
    environment:
      - TZ=Europe/Madrid
    depends_on:
      - mailer

  mailer:
    build: ./mailer
    container_name: portfolio-mailer
    restart: unless-stopped
    environment:
      - GMAIL_USER=${GMAIL_USER}
      - GMAIL_APP_PASS=${GMAIL_APP_PASS}
      - GROQ_API_KEY=${GROQ_API_KEY}
    # Port 3001 is only reachable inside the Docker network (via Nginx proxy).
    # It is intentionally NOT mapped to the host.
    expose:
      - "3001"
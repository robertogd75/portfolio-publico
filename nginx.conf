server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;

    # Public REST API — serve static JSON with CORS headers
    location /api/ {
        add_header 'Access-Control-Allow-Origin'  '*'           always;
        add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Accept'      always;
        default_type application/json;
        # Allow requests without .json extension: /api/v1/cars → cars.json
        try_files $uri $uri.json $uri/index.json =404;
    }

    # Cache assets con hash en el nombre (Vite los genera así)
    location ~* \.(js|css|woff2?|ttf|eot|otf|ico|png|jpg|jpeg|webp|svg|gif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — todas las rutas devuelven index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}

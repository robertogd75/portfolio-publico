server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;
    
    # Security Headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;


    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;

    # AI Chat — proxied to the mailer container
    location = /api/chat {
        proxy_pass         http://mailer:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Connection        "";
        proxy_read_timeout 30s;
    }

    # Contact form — proxied to the mailer container (port 3001, internal only)
    location = /api/contact {
        proxy_pass         http://mailer:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Connection        "";
    }

    # Public REST API — serve static JSON with CORS headers
    location /api/ {
        add_header 'Access-Control-Allow-Origin'  '*'           always;
        add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Accept'      always;
        default_type application/json;
        # Allow requests without .json extension: /api/v1/cars → cars.json
        try_files $uri $uri.json $uri/index.json =404;
    }

    # Cache assets con hash en el nombre (Vite los genera así)
    location ~* \.(js|css|woff2?|ttf|eot|otf|ico|png|jpg|jpeg|webp|svg|gif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — todas las rutas devuelven index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
